<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scramble Demo — Simba Conteh</title>

  <style>
    @font-face {
      font-family: 'DisplayFont';
      src: url('fonts/coolvetica/Coolvetica Rg.otf') format('opentype');
      font-weight: 400;
      font-display: block;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D1B2A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Name display ── */
    #name {
      font-family: 'DisplayFont', 'Space Grotesk', sans-serif;
      font-weight: 400;
      line-height: 0.9;
      white-space: nowrap;
      padding: 0 2%;
    }

    .ch-space    { display: inline-block; width: 0.28em; }

    /* Scrambling: orange accent */
    .ch-rnd {
      display: inline-block;
      color: #C05A28;
    }

    /* Locked: beige, with a brief white flash on lock-in */
    .ch-done {
      display: inline-block;
      color: #F6F1E9;
    }
    .ch-done.flash { animation: lock-flash 0.3s ease forwards; }
    @keyframes lock-flash {
      0%   { color: #ffffff; }
      100% { color: #F6F1E9; }
    }

    /* ── Replay button ── */
    #replay {
      margin-top: 3.5rem;
      background: transparent;
      border: 1px solid rgba(246,241,233,0.15);
      color: rgba(246,241,233,0.38);
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 0.6rem 1.75rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #replay:hover { border-color: #C05A28; color: #D4793F; }
  </style>
</head>
<body>

  <div id="name"></div>
  <button id="replay">&#8635; Replay</button>

  <script>
  'use strict';

  /* ── Config ─────────────────────────────────────────── */
  const TARGET   = 'SIMBA CONTEH';
  const POOL     = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&?*';
  const WARMUP   = 600;  // ms of full scramble before first letter locks in
  const STEP     = 100;  // ms between each successive letter locking (L → R)
  const TICK     = 50;   // ms between random char swaps (~20fps visual rate)

  /* ── Helpers ─────────────────────────────────────────── */
  let rafId = null;
  const rnd = () => POOL[Math.floor(Math.random() * POOL.length)];

  /* Binary-search font-size so name fills targetPx exactly */
  function fitLine(el, targetPx) {
    el.style.whiteSpace = 'nowrap';
    let lo = 10, hi = 4000;
    el.style.fontSize = hi + 'px';
    while (hi - lo > 1) {
      const mid = Math.round((lo + hi) / 2);
      el.style.fontSize = mid + 'px';
      if (el.scrollWidth <= targetPx) lo = mid; else hi = mid;
    }
    el.style.fontSize = lo + 'px';
  }

  /* ── Core scramble function ──────────────────────────── */
  function scramble(el, text) {
    if (rafId) cancelAnimationFrame(rafId);

    const chars = [...text];     // spread keeps space as its own entry
    const n     = chars.length;

    /* Build the spans once — update only textContent each frame */
    el.innerHTML = '';
    const spans = chars.map(ch => {
      const s = document.createElement('span');
      if (ch === ' ') {
        s.className   = 'ch-space';
        s.textContent = ' ';
      } else {
        s.className   = 'ch-rnd';
        s.textContent = rnd();
      }
      el.appendChild(s);
      return s;
    });

    /* Each letter's lock timestamp (spaces are always spaces) */
    const lockAt = chars.map((ch, i) => ch === ' ' ? 0 : WARMUP + i * STEP);
    const locked = chars.map(ch => ch === ' ');

    const t0     = performance.now();
    let   lastTick = 0;

    function frame(now) {
      const elapsed  = now - t0;
      const doSwap   = (now - lastTick) > TICK;
      if (doSwap) lastTick = now;

      let pending = false;

      for (let i = 0; i < n; i++) {
        if (locked[i]) continue;

        if (elapsed >= lockAt[i]) {
          /* Letter resolves */
          locked[i] = true;
          spans[i].textContent = chars[i];
          spans[i].className   = 'ch-done flash';
          spans[i].addEventListener(
            'animationend',
            () => spans[i].classList.remove('flash'),
            { once: true }
          );
        } else {
          /* Still scrambling */
          if (doSwap) spans[i].textContent = rnd();
          pending = true;
        }
      }

      if (pending) rafId = requestAnimationFrame(frame);
    }

    rafId = requestAnimationFrame(frame);
  }

  /* ── Init ────────────────────────────────────────────── */
  const nameEl    = document.getElementById('name');
  const replayBtn = document.getElementById('replay');

  document.fonts.ready.then(async () => {
    try { await document.fonts.load('400 100px "DisplayFont"', TARGET); } catch(e) {}

    /* Size the name to fill 96% of the viewport width */
    const measure = document.createElement('span');
    measure.style.cssText =
      'position:absolute;visibility:hidden;white-space:nowrap;' +
      'font-family:"DisplayFont","Space Grotesk",sans-serif;font-weight:400;';
    measure.textContent = TARGET;
    document.body.appendChild(measure);
    fitLine(measure, document.documentElement.clientWidth * 0.96);
    nameEl.style.fontSize = measure.style.fontSize;
    document.body.removeChild(measure);

    scramble(nameEl, TARGET);
  });

  replayBtn.addEventListener('click', () => scramble(nameEl, TARGET));

  /* Re-size on window resize */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const measure = document.createElement('span');
      measure.style.cssText =
        'position:absolute;visibility:hidden;white-space:nowrap;' +
        'font-family:"DisplayFont","Space Grotesk",sans-serif;font-weight:400;';
      measure.textContent = TARGET;
      document.body.appendChild(measure);
      fitLine(measure, document.documentElement.clientWidth * 0.96);
      nameEl.style.fontSize = measure.style.fontSize;
      document.body.removeChild(measure);
    }, 120);
  });
  </script>

</body>
</html>
